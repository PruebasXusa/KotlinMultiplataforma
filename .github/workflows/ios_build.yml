name: iOS Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest  # Esto le dice a GitHub que use un servidor Mac
    defaults:
      run:
        working-directory: KotlinProject
  
    steps:
      - uses: actions/checkout@v4
     
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Este comando compila el framework de iOS
      - name: Build iOS Framework
        run: ./gradlew :composeApp:assembleDebugAppleFrameworkForXcode --stacktrace --info

      - name: Build iOS App Archive
        run: |
          xcodebuild -project iosApp/iosApp.xcodeproj \
                     -scheme iosApp \
                     -configuration Debug \
                     -destination 'platform=iOS Simulator,name=iPhone 15' \
                     -derivedDataPath build/ios \
                     build

      # Opcional: Si quieres generar el archivo para Appetize.io
      - name: Build Simulator App
        run: ./gradlew :composeApp:iosSimulatorArm64Binaries

      - name: Upload iOS App to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
        
          path: |
            **/build/bin/iosSimulatorArm64/debugExecutable/*.app
          if-no-files-found: error

