name: iOS Build for Appetize

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./KotlinProject/gradlew

      - name: Build iOS Simulator App (Xcode)
        working-directory: KotlinProject
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=dvtdevice-DVTiOSDeviceSimulatorPlaceholder-iphonesimulator:placeholder" \
            -derivedDataPath ./derived_data \
            -sdk iphonesimulator \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS="arm64" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      # Este paso te dirá en el log exactamente dónde se guardó el .app
      - name: Locate App Bundle
        run: find . -name "*.app" -type d

      - name: Upload iOS App to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          # Usamos un patrón de búsqueda global para evitar errores de ruta
          path: "**/derived_data/**/*.app"
          if-no-files-found: error

