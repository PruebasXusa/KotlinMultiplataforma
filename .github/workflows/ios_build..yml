name: iOS Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: KotlinProject
  
    steps:
    
      - uses: actions/checkout@v4

      - name: Select Xcode 16.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'
     
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 1. Generamos el framework que Xcode necesita para enlazar Compose
      - name: Build Kotlin iOS Framework
        run: ./gradlew :composeApp:assembleDebugAppleFrameworkForXcode

      # 2. Compilamos la App de iOS usando Xcode. 
      # Añadimos clean y forzamos la arquitectura del simulador (arm64).
      - name: Build iOS app (Xcode)
        run: |
          # Eliminamos la carpeta de previews para evitar el fallo de validación
          rm -rf iosApp/iosApp/Preview\ Content

          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -UseNewBuildSystem=YES \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -derivedDataPath build/ios \
            -sdk iphonesimulator \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            ENABLE_PREVIEWS=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES \
            ASSETCATALOG_COMPILER_SKIP_APP_ICON_VALIDATION=YES \
            DEVELOPMENT_ASSET_PATHS= \
            FRAMEWORK_SEARCH_PATHS=$(SRCROOT)/../composeApp/build/xcode-frameworks/debug/iphonesimulator      # 3. Subimos el .app resultante (el que Xcode empaquetó en derivedDataPath)
      
      - name: Upload iOS App to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: "**/build/ios/Build/Products/Debug-iphonesimulator/*.app"
          if-no-files-found: error
