name: iOS Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./KotlinProject/gradlew

      # NO ejecutes assembleDebugAppleFramework manualmente antes de Xcode
      # Xcode lo llamará automáticamente. Solo asegúrate de que las rutas son correctas.

      - name: Build iOS Simulator App (Xcode)
        working-directory: KotlinProject # Entramos a la carpeta del proyecto
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ../build/ios \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty # Opcional: limpia el log si está instalado

      - name: Upload iOS App to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          # Ajustamos la ruta al path real donde Xcode deja el .app
          path: build/ios/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: error
