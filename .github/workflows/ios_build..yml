name: iOS Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest  # Esto le dice a GitHub que use un servidor Mac
    defaults:
      run:
        working-directory: KotlinProject
  
    steps:
      - uses: actions/checkout@v4 # clona el repositorio en runner
     
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3 # cofigura gradlew en el runner

      # Este comando compila el framework de iOS que luego se usa para enlazar la app
      - name: Build iOS Framework
        run: ./gradlew :composeApp:assembleDebugAppleFrameworkForXcode --stacktrace --info

      # Opcional: Si quieres generar el archivo para Appetize.io
      - name: Build Simulator App
        run: ./gradlew :composeApp:iosSimulatorArm64Binaries

      - name: Build iOS Simulator App
        run: |
          # Limpiamos previews para evitar errores
          # rm -rf iosApp/iosApp/Preview\ Content
        
          # Compilar usando Xcode para cualquier simulador
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            #-scheme iosApp \
            -target iosApp \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/ios \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Upload iOS App to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: "KotlinProject/build/ios/Build/Products/Debug-iphonesimulator/*.app"
          if-no-files-found: error
